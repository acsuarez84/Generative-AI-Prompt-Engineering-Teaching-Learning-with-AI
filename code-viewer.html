<script>
const RAW_URL = 'https://raw.githubusercontent.com/acsuarez84/Generative-AI-Prompt-Engineering-Teaching-Learning-with-AI/main/index.html';

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Simple syntax highlighter for HTML/JS/CSS
function highlight(line) {
  let s = esc(line);

  // HTML comments
  s = s.replace(/(&lt;!--.*?--&gt;)/g, '<span class="cm">$1</span>');
  // JS single-line comments
  s = s.replace(/(\/\/[^\n]*)/g, '<span class="cm">$1</span>');
  // HTML tags
  s = s.replace(/(&lt;\/?)([\w\-]+)/g, '$1<span class="tg">$2</span>');
  // HTML attributes
  s = s.replace(/\s([\w\-]+)(=)(&quot;)/g, ' <span class="at">$1</span>$2<span class="vl">$3</span>');
  // JS keywords
  s = s.replace(/\b(const|let|var|function|return|if|else|for|while|new|typeof|instanceof|switch|case|break|default|try|catch|finally|async|await|class|import|export|null|undefined|true|false|this)\b/g, '<span class="kw">$1</span>');
  // Strings (single-quoted, double-quoted, template)
  s = s.replace(/(&quot;[^&]*?&quot;)/g, '<span class="st">$1</span>');
  s = s.replace(/(&#39;[^&#]*?&#39;)/g, '<span class="st">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="nm">$1</span>');
  // CSS properties
  s = s.replace(/(--[\w-]+)(:)/g, '<span class="cs">$1</span>$2');
  // Functions
  s = s.replace(/\b(function|getElementById|querySelector|querySelectorAll|addEventListener|forEach|indexOf|push|pop|splice|join|split|map|filter|find|findIndex|sort|slice|replace|trim|parseInt|parseFloat|Math|JSON|fetch|Array|Object|Date|console|setTimeout|clearTimeout|setInterval|alert|window|document|navigator)\b/g, '<span class="fn">$1</span>');

  return s;
}

async function loadCode() {
  const tbody = document.getElementById('code-body');
  try {
    const res = await fetch(RAW_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const lines = text.split('\n');

    document.getElementById('line-count').textContent = lines.length + ' lines · ' + (text.length / 1024).toFixed(1) + ' KB';

    let html = '';
    lines.forEach(function(line, i) {
      const n = i + 1;
      html += '<tr id="L' + n + '">'
        + '<td class="ln" onclick="location.hash=\'L' + n + '\'">' + n + '</td>'
        + '<td class="code">' + highlight(line || ' ') + '</td>'
        + '</tr>';
    });
    tbody.innerHTML = html;
  } catch (e) {
    tbody.innerHTML = '<tr><td class="ln">—</td><td class="code" style="color:#ff7b72;padding:24px;">Could not load file. <a href="' + RAW_URL + '" style="color:#58a6ff;" target="_blank">View raw on GitHub ↗</a></td></tr>';
    document.getElementById('line-count').textContent = 'Error loading file';
  }
}

loadCode();
</script>
